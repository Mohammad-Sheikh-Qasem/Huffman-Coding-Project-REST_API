# ============================================================
# application.properties
# Huffman Coding Compression System – Spring Boot Configuration
# ============================================================

# Server
server.port=8080
spring.application.name=huffman-coding

# Logging
logging.level.root=INFO
logging.level.com.huffman=DEBUG

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Jackson – pretty-print JSON responses
spring.jackson.serialization.indent-output=true

# File upload (if extending to file-based REST later)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
